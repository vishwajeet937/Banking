      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::812616070174:role/github-action-deploy-role
          aws-region: us-east-1

      - name: Fleet Health Checks
        id: health
        run: |
          CMD_ID=$(aws ssm send-command \
