name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify_connection:
    uses: ./.github/workflows/test_connection.yml
    permissions:
      id-token: write
      contents: read

  test_fleet_health_envs:
    needs: verify_connection
    uses: ./.github/workflows/test_fleet_health.yml
    permissions:
      id-token: write
      contents: read

  smoke_testing:
    needs: verify_connection
    uses: ./.github/workflows/smoke_test.yml
    permissions:
      id-token: write
      contents: read

  build_push:
    needs: verify_connection
    uses: ./.github/workflows/build_push.yml
    permissions:
      id-token: write
      contents: read

  deploy:
    needs: verify_connection
    uses: ./.github/workflows/deploy.yml
    permissions:
      id-token: write
      contents: read